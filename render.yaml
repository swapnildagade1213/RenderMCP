services:
  - type: web
    name: render-mcp
    env: python
    region: oregon            # or any supported Render region
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: starter            # free/starter/standard – free sleeps after 15 mins idle
